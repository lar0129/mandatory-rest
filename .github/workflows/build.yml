name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - LICENSE

permissions:
  contents: read

concurrency:
  group: windows-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Check frontend
        run: npm run check

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build Windows installer and portable EXE
        run: npm run tauri build -- --bundles nsis
        env:
          CI: true

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          $portable = Get-Item 'src-tauri/target/release/pomotroid.exe'
          Copy-Item $portable.FullName 'dist/Mandatory-Rest-portable.exe'

          $installer = Get-ChildItem 'src-tauri/target/release/bundle/nsis/*-setup.exe' |
            Select-Object -First 1
          if (-not $installer) {
            throw 'NSIS installer was not generated.'
          }
          Copy-Item $installer.FullName 'dist/Mandatory-Rest-setup.exe'

          Get-FileHash 'dist/Mandatory-Rest-portable.exe' -Algorithm SHA256 |
            Format-List | Out-File 'dist/SHA256SUMS.txt'
          Get-FileHash 'dist/Mandatory-Rest-setup.exe' -Algorithm SHA256 |
            Format-List | Out-File 'dist/SHA256SUMS.txt' -Append

      - name: Upload Windows EXE files
        uses: actions/upload-artifact@v4
        with:
          name: mandatory-rest-windows-x64-${{ github.run_number }}
          path: dist/*
          if-no-files-found: error
          retention-days: 30

      - name: Write build summary
        shell: pwsh
        run: |
          Add-Content $env:GITHUB_STEP_SUMMARY '## Mandatory Rest Windows build'
          Add-Content $env:GITHUB_STEP_SUMMARY ''
          Add-Content $env:GITHUB_STEP_SUMMARY '- `Mandatory-Rest-setup.exe`: installer'
          Add-Content $env:GITHUB_STEP_SUMMARY '- `Mandatory-Rest-portable.exe`: portable executable'
          Add-Content $env:GITHUB_STEP_SUMMARY ''
          Add-Content $env:GITHUB_STEP_SUMMARY 'Download them from the **Artifacts** section of this workflow run.'
